<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 数据看板</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>📊 ETF 数据看板</h1>
        <p>自动采集 · 每日更新</p>
    </header>

    <main>
        <section id="data-overview">
            <h2>📋 全市场ETF数据</h2>
            <p>覆盖深交所 + 上交所全部ETF，含份额、净值、市值及排行榜。</p>
            <div class="download-box">
                <a href="assets/posts/%E5%85%A8%E5%B8%82%E5%9C%BA%E6%95%B0%E6%8D%AE%E5%88%86%E6%9E%90%E8%A1%A802.xlsx" class="download-btn" download>
                    📥 下载全市场数据分析表 (Excel)
                </a>
                <p class="hint">Excel 文件可直接打开，包含4个Sheet：全量数据 · 全部排行榜 · 大市值 · 小市值</p>
            </div>
            <div id="data-container">
                <p class="loading">数据加载中...</p>
            </div>
        </section>

        <section id="update-info">
            <p>🕐 最后更新：<span id="last-update">--</span></p>
        </section>
    </main>

    <footer>
        <p>数据来源：上海证券交易所 · 深圳证券交易所</p>
        <p>Powered by GitHub Actions · 每日凌晨自动采集</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
