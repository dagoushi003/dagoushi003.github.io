name: ETF 数据自动采集

on:
  schedule:
    # 每天凌晨 3:00 (北京时间 UTC+8)
    - cron: '0 19 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests openpyxl chinese_calendar

      - name: 运行采集脚本
        run: python etf_spider.py

      - name: 提交并推送数据
        run: |
          git config user.name "dagoushi003"
          git config user.email "dagoushi003@163.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 每日ETF数据自动更新 $(date +'%Y-%m-%d')"
          git push
