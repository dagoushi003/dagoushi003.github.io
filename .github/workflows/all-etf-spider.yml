# all-etf-spider.yml — 全市场ETF数据采集（ dagoushi003.github.io ）
# 每天 UTC 19:00 = 北京时间凌晨 3:00 自动运行
# 深交所 + 上交所ETF份额/净值/市值，写入 Excel 并推送至博客仓库

name: 全市场ETF数据采集

on:
  schedule:
    # 北京时间 03:00 = UTC 19:00
    - cron: '0 19 * * 1-5'   # 周一至周五
  workflow_dispatch:          # 支持手动运行

# 防止重复运行
concurrency:
  group: all-etf-spider
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  spider:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # SSE有860只，最多给2小时

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置时区
        run: sudo ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime

      - name: 安装 Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install selenium openpyxl pandas requests webdriver-manager chinese-calendar

      - name: 运行爬虫
        run: python all_etf_spider.py
        env:
          TZ: Asia/Shanghai

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-etf-spider-log
          path: /home/runner/work/_temp/_github_workflow/event.json
          retention-days: 30
